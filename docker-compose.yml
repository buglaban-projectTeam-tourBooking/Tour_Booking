version: '3.8'

services:
  # Backend Service
  backend:
    build: ./Back_end
    container_name: backend_container
    ports:
      - "5000:5000"
    volumes:
      - ./Back_end:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - NODE_ENV=development
    networks:
      - tour_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/tours/domestic || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build: ./Front_end
    container_name: frontend_container
    ports:
      - "5173:5173"
    volumes:
      - ./Front_end:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:5000
    networks:
      - tour_network
    restart: unless-stopped
    depends_on:
      - backend

networks:
  tour_network:
    driver: bridge
