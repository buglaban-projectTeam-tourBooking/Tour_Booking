services:
  # Tên dịch vụ Frontend
  frontend:
    build: ./Front_end
    container_name: frontend_container
    ports:
      - "5173:5173"
    volumes:
      - ./Front_end:/app
      - /app/node_modules # Giữ lại node_modules trong container để tránh conflict với máy thật
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  # Tên dịch vụ Backend
  backend:
    build: ./Back_end
    container_name: backend_container
    ports:
      - "3000:3000"
    volumes:
      - ./Back_end:/app
      - /app/node_modules
    environment:
      - PORT=3000
